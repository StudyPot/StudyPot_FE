name: Create Jira Issue

on:
  workflow_dispatch:
    inputs:
      summary:
        description: Jira 티켓 제목
        required: true
        type: string
      description:
        description: Jira 티켓 설명 (선택)
        required: false
        type: string

permissions:
  contents: read

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      SUMMARY: ${{ github.event.inputs.summary }}
      DESCRIPTION: ${{ github.event.inputs.description }}

    steps:
      - name: Validate Jira settings
        run: |
          missing=0

          for value in JIRA_BASE_URL JIRA_PROJECT_KEY JIRA_ISSUE_TYPE JIRA_EMAIL JIRA_API_TOKEN; do
            if [[ -z "${!value}" ]]; then
              echo "::error title=Missing Jira setting::$value is not configured in GitHub Actions secrets or variables."
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Build Jira request body
        run: |
          if [[ -n "$DESCRIPTION" ]]; then
            jq -n \
              --arg projectKey "$JIRA_PROJECT_KEY" \
              --arg summary "$SUMMARY" \
              --arg issueType "$JIRA_ISSUE_TYPE" \
              --arg description "$DESCRIPTION" \
              '{
                fields: {
                  project: { key: $projectKey },
                  summary: $summary,
                  issuetype: { name: $issueType },
                  description: {
                    type: "doc",
                    version: 1,
                    content: [
                      {
                        type: "paragraph",
                        content: [
                          {
                            type: "text",
                            text: $description
                          }
                        ]
                      }
                    ]
                  }
                }
              }' > jira-request.json
          else
            jq -n \
              --arg projectKey "$JIRA_PROJECT_KEY" \
              --arg summary "$SUMMARY" \
              --arg issueType "$JIRA_ISSUE_TYPE" \
              '{
                fields: {
                  project: { key: $projectKey },
                  summary: $summary,
                  issuetype: { name: $issueType }
                }
              }' > jira-request.json
          fi

      - name: Create Jira issue
        id: create
        run: |
          response=$(curl --silent --show-error --fail-with-body \
            --request POST \
            --url "$JIRA_BASE_URL/rest/api/3/issue" \
            --user "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data @jira-request.json)

          echo "$response"

          issue_key=$(echo "$response" | jq -r '.key')
          issue_id=$(echo "$response" | jq -r '.id')

          if [[ -z "$issue_key" || "$issue_key" == "null" ]]; then
            echo "::error title=Jira issue key missing::Jira did not return an issue key."
            exit 1
          fi

          echo "issue_key=$issue_key" >> "$GITHUB_OUTPUT"
          echo "issue_id=$issue_id" >> "$GITHUB_OUTPUT"
          echo "issue_url=${JIRA_BASE_URL%/}/browse/$issue_key" >> "$GITHUB_OUTPUT"

      - name: Show created issue
        env:
          ISSUE_KEY: ${{ steps.create.outputs.issue_key }}
          ISSUE_URL: ${{ steps.create.outputs.issue_url }}
        run: |
          {
            echo "## Jira issue created"
            echo
            echo "- Jira key: \`$ISSUE_KEY\`"
            echo "- Jira link: $ISSUE_URL"
            echo "- Recommended branch name: \`$ISSUE_KEY/short-description\`"
          } >> "$GITHUB_STEP_SUMMARY"
