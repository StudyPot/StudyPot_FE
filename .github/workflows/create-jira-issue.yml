name: Create Jira Issue

on:
  workflow_dispatch:
    inputs:
      summary:
        description: Jira 티켓 제목
        required: true
        type: string
      description:
        description: Jira 티켓 설명 (선택)
        required: false
        type: string
      branch_suffix:
        description: 브랜치 이름 suffix (선택, 영문/숫자/하이픈 권장)
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    environment: studypot
    env:
      JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      SUMMARY: ${{ github.event.inputs.summary }}
      DESCRIPTION: ${{ github.event.inputs.description }}
      BRANCH_SUFFIX: ${{ github.event.inputs.branch_suffix }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Validate Jira settings
        run: |
          missing=0

          for value in JIRA_BASE_URL JIRA_PROJECT_KEY JIRA_ISSUE_TYPE JIRA_EMAIL JIRA_API_TOKEN; do
            if [[ -z "${!value}" ]]; then
              echo "::error title=Missing Jira setting::$value is not configured in GitHub Actions secrets or variables."
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Build Jira request body
        run: |
          if [[ -n "$DESCRIPTION" ]]; then
            jq -n \
              --arg projectKey "$JIRA_PROJECT_KEY" \
              --arg summary "$SUMMARY" \
              --arg issueType "$JIRA_ISSUE_TYPE" \
              --arg description "$DESCRIPTION" \
              '{
                fields: {
                  project: { key: $projectKey },
                  summary: $summary,
                  issuetype: { name: $issueType },
                  description: {
                    type: "doc",
                    version: 1,
                    content: [
                      {
                        type: "paragraph",
                        content: [
                          {
                            type: "text",
                            text: $description
                          }
                        ]
                      }
                    ]
                  }
                }
              }' > jira-request.json
          else
            jq -n \
              --arg projectKey "$JIRA_PROJECT_KEY" \
              --arg summary "$SUMMARY" \
              --arg issueType "$JIRA_ISSUE_TYPE" \
              '{
                fields: {
                  project: { key: $projectKey },
                  summary: $summary,
                  issuetype: { name: $issueType }
                }
              }' > jira-request.json
          fi

      - name: Create Jira issue
        id: create
        run: |
          response=$(curl --silent --show-error --fail-with-body \
            --request POST \
            --url "$JIRA_BASE_URL/rest/api/3/issue" \
            --user "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data @jira-request.json)

          echo "$response"

          issue_key=$(echo "$response" | jq -r '.key')
          issue_id=$(echo "$response" | jq -r '.id')

          if [[ -z "$issue_key" || "$issue_key" == "null" ]]; then
            echo "::error title=Jira issue key missing::Jira did not return an issue key."
            exit 1
          fi

          echo "issue_key=$issue_key" >> "$GITHUB_OUTPUT"
          echo "issue_id=$issue_id" >> "$GITHUB_OUTPUT"
          echo "issue_url=${JIRA_BASE_URL%/}/browse/$issue_key" >> "$GITHUB_OUTPUT"

      - name: Build branch name
        id: branch
        env:
          ISSUE_KEY: ${{ steps.create.outputs.issue_key }}
        run: |
          branch_source="$BRANCH_SUFFIX"

          if [[ -z "$branch_source" ]]; then
            branch_source="$SUMMARY"
          fi

          branch_slug=$(echo "$branch_source" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')

          if [[ -z "$branch_slug" ]]; then
            branch_slug="work-item"
          fi

          branch_name="$ISSUE_KEY/$branch_slug"

          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "branch_slug=$branch_slug" >> "$GITHUB_OUTPUT"

      - name: Create remote branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_KEY: ${{ steps.create.outputs.issue_key }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        run: |
          base_branch_response=$(curl --silent --show-error --fail-with-body \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/git/ref/heads/$DEFAULT_BRANCH")

          base_sha=$(echo "$base_branch_response" | jq -r '.object.sha')

          if [[ -z "$base_sha" || "$base_sha" == "null" ]]; then
            echo "::error title=Base branch SHA missing::Could not resolve the default branch SHA."
            exit 1
          fi

          create_branch_payload=$(jq -n \
            --arg ref "refs/heads/$BRANCH_NAME" \
            --arg sha "$base_sha" \
            '{ ref: $ref, sha: $sha }')

          curl --silent --show-error --fail-with-body \
            --request POST \
            --url "https://api.github.com/repos/$GITHUB_REPOSITORY/git/refs" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$create_branch_payload"

      - name: Show created issue and branch
        env:
          ISSUE_KEY: ${{ steps.create.outputs.issue_key }}
          ISSUE_URL: ${{ steps.create.outputs.issue_url }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        run: |
          {
            echo "## Jira issue created"
            echo
            echo "- Jira key: \`$ISSUE_KEY\`"
            echo "- Jira link: $ISSUE_URL"
            echo "- Remote branch created: \`$BRANCH_NAME\`"
            echo
            echo "## Next step"
            echo
            echo '```bash'
            echo "git fetch origin"
            echo "git switch --track origin/$BRANCH_NAME"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
