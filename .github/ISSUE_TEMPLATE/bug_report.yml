name: 버그 제보
description: 재현 가능한 버그를 제보합니다.
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 어떤 문제가 발생했는지 한두 문장으로 적어주세요.
      placeholder: 예) 회원가입 버튼 클릭 시 화면이 멈춥니다.
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: 현재 동작
      description: 지금 실제로 어떤 일이 발생하는지 적어주세요.
      placeholder: 예) 버튼 클릭 후 로딩만 계속되고 다음 화면으로 이동하지 않습니다.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 기대 동작
      description: 원래 어떤 동작을 기대했는지 적어주세요.
      placeholder: 예) 회원가입이 완료되고 메인 화면으로 이동해야 합니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 가능한 한 순서대로 적어주세요.
      placeholder: |
        1. 회원가입 페이지로 이동
        2. 이메일/비밀번호 입력
        3. 회원가입 버튼 클릭
        4. 오류 발생 확인
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 환경 정보
      description: 브라우저, OS, 기기 등 재현 환경을 적어주세요.
      placeholder: |
        - Browser: Chrome 136
        - OS: Windows 11
        - Device: Desktop
    validations:
      required: false

  - type: input
    id: jira
    attributes:
      label: 관련 Jira 이슈
      description: 이미 Jira 티켓이 있다면 이슈 키를 적어주세요.
      placeholder: 예) SPT-123
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷 / 참고 자료
      description: 화면 캡처, 로그, 콘솔 에러 등을 적어주세요.
      placeholder: 스크린샷이나 로그를 붙여주세요.
    validations:
      required: false
